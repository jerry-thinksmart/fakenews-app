  <circle cx="32" cy="32" r="32" fill="#274665"/>
  <!-- Newspaper lines (background) -->
  <rect x="14" y="16" width="24" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="14" y="22" width="20" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="14" y="28" width="22" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>
  <rect x="14" y="34" width="16" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>
  <!-- Magnifying glass (white handle + orange circle ring) -->
  <circle cx="33" cy="30" r="11" fill="none" stroke="#F08030" stroke-width="4"/>
  <circle cx="33" cy="30" r="7" fill="rgba(255,255,255,0.1)"/>
  <!-- Handle -->
  <line x1="41" y1="38" x2="50" y2="47" stroke="white" stroke-width="4.5" stroke-linecap="round"/>
